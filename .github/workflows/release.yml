name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y

          $paths = @(
            "C:\Program Files\Inno Setup 7",
            "C:\Program Files (x86)\Inno Setup 7",
            "C:\Program Files\Inno Setup 6",
            "C:\Program Files (x86)\Inno Setup 6"
          )

          foreach ($p in $paths) {
            if (Test-Path $p) {
              echo $p | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

          where.exe ISCC

      - name: Build Release
        shell: powershell
        run: |
          python release.py

      - name: Clean existing release assets
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          write-host "Checking if release exists for tag: $tag"
          $ErrorActionPreference = 'Continue'
          gh release view $tag --json name >$null 2>&1
          if ($LASTEXITCODE -eq 0) {
              write-host "Release exists. Querying assets..."
              $assets = gh release view $tag --json assets --jq '.assets[].name' 2>$null
              if ($assets) {
                  foreach ($asset in $assets) {
                      if ($asset -ne $null -and $asset -ne "") {
                          write-host "Deleting existing asset: $asset"
                          gh release delete-asset $tag $asset -y 2>&1
                      }
                  }
              }
          } else {
              write-host "No existing release found for tag $tag. It will be created."
          }
          $LASTEXITCODE = 0

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/*.exe
          generate_release_notes: true