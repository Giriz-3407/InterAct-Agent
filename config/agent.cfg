[agent]
; InterAct Desktop Agent — Configuration File
;
; This file is read at startup. Environment variable INTERACT_AGENT_PORT
; (if set) overrides the port value below.
;
; host — bind address for the WebSocket server.
;        Must stay 127.0.0.1 for localhost-only (recommended).
;
; port — TCP port for the WebSocket server.
;        Change only if 8765 is already in use on this machine.
;        The browser must be configured with the same port via VITE_AGENT_PORT.

host = 127.0.0.1
port = 8765

; github_repo — GitHub repository for auto-updates in format owner/repo
github_repo = Giriz-3407/InterAct-Agent

